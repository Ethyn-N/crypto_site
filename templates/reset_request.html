{% extends 'base.html' %}

{% block title %}Reset Password - CryptoSite{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h3>Request Password Reset</h3>
      </div>
      <div class="card-body">
        <form method="post">
          {{ form.csrf_token }}
          <div class="mb-3">
            <label for="username" class="form-label">Username:</label>
            {{ form.username(class="form-control", id="username") }}
          </div>
          <div class="d-grid">
            {{ form.submit(class="btn btn-primary") }}
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
